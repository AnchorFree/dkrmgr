# Workflow automatically managed by https://github.com/AnchorFree/workflows/
# DO NOT EDIT HERE
name: Build and push Docker image

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*.*.*'
  release:
    types:
      - released

permissions:
  id-token: write
  contents: read

jobs:


  docker_build:

    runs-on: ubuntu-latest

    steps:
      - name: Import Secrets
        uses: hashicorp/vault-action@65d7a12a8098b0aa7fcfdf22ad850c051f8b3ccb # v2.7.2
        id: secrets
        with:
          url: https://vault.afdevops.com
          method: jwt
          role: jwt-github-role
          path: jwt-github
          jwtGithubAudience: https://github.com/AnchorFree
          exportEnv: false
          secrets: |
            secret/devops/cloud_providers/gcp/aura-networking/gar/gh-actions-rw auth | GAR_TOKEN

      - name: Login to registry - GAR
        uses: docker/login-action@465a07811f14bebb1938fbed4728c6a1ff8901fc # v2.2.0
        with:
          registry: us-docker.pkg.dev
          username: _json_key
          password: ${{ steps.secrets.outputs.GAR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@818d4b7b91585d195f67373fd9cb0332e31a7175 # v4.6.0
        with:
          images: |
            us-docker.pkg.dev/aura-networking/docker-registry/${{ github.repository }}
          tags: |
            type=schedule
            type=semver,pattern=v{{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern=v{{major}}
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@0a97817b6ade9f46837855d676c4cca3a2471fc9 # v4.2.1
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
