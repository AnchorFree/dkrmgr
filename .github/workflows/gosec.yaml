name: Run Gosec

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: on
    steps:
      - name: Checkout Source 
        uses: actions/checkout@ee0669bd1cc54295c223e0bb666b733df41de1c5 # v2.7.0
      - name: Run Gosec Security Scanner
        id: gosec
        uses: securego/gosec@4a3bd8af174872c778439083ded7adbf3747e770 #v2.26.1
        with:
          args: ./...

      - uses: actions/github-script@5d03ada4b0a753e9460b312e61cc4f8fdeacf163 # 0.9.0
        if: github.event_name == 'pull_request'
        env:
          GOSEC: "gosec\n${{ steps.gosec.outputs.stdout }}"
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Gosec check 📖\`${{ steps.gosec.outcome }}\`
            
            <details><summary>Show Gosec output</summary>
            
            \`\`\`${process.env.GOSEC}\`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}*`;
              
            github.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
